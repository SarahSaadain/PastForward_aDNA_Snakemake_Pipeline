name: Auto Tag and Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main

      - name: Update version.py from tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          TAG=${{ steps.tag.outputs.new_tag }}
          VERSION=${TAG#v}
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" workflow/scripts/version.py

      - name: Commit version.py back to main
        if: steps.tag.outputs.new_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/version.py
          git commit -m "chore: sync version.py to ${{ steps.tag.outputs.new_tag }} [skip ci]" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: pastForward ${{ steps.tag.outputs.new_tag }}
          generateReleaseNotes: true